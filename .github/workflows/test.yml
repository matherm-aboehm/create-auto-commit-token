name: Test action

on:
  push:
    branches:
      - main
  pull_request:
  merge_group:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  integration:
    name: integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: package.json

      - run: npm ci
      - run: npm test

  end-to-end:
    name: end-to-end
    runs-on: ubuntu-latest
    # do not run from forks, as forks don’t have access to repository secrets
    if: github.event_name == 'merge_group' || github.event.pull_request.head.repo.owner.login == github.event.pull_request.base.repo.owner.login
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: package.json
      - run: npm ci
      - run: npm run build
      - uses: ./ # Uses the action in the root directory
        id: test-without-app-installation
        continue-on-error: true
      - name: Fail when test without app installtion succeeds
        run: |
          exit 1
        if: ${{ steps.test-without-app-installation.outcome == 'success' }}
      - uses: ./ # Uses the action in the root directory
        id: test-with-app-installation
        with:
          owner: ${{ github.repository_owner }}
          repositories: setup-dotnet
      - uses: octokit/request-action@v2.x
        id: get-repository
        env:
          GITHUB_TOKEN: ${{ steps.test-with-app-installation.outputs.token }}
        with:
          route: GET /installation/repositories
      - run: echo '${{ steps.get-repository.outputs.data }}'